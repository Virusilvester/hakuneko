name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name to release (e.g. v40.6.0)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            src/app/package-lock.json

      - name: Install dependencies (root)
        env:
          npm_config_ignore_scripts: "true"
        run: npm ci --omit=optional --legacy-peer-deps

      - name: Install dependencies (src/app)
        env:
          npm_config_ignore_scripts: "true"
        run: |
          cd src/app
          npm ci --omit=optional --legacy-peer-deps

      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fakeroot dpkg lintian rpm unzip

      - name: Install 7-Zip
        if: runner.os == 'Windows'
        run: choco install 7zip -y --no-progress

      - name: Add 7-Zip to PATH
        if: runner.os == 'Windows'
        run: echo "C:\Program Files\7-Zip" >> $env:GITHUB_PATH

      - name: Build packages
        run: npm run build:app

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ runner.os }}
          if-no-files-found: error
          path: |
            build/*.exe
            build/*.zip
            build/*.deb
            build/*.rpm

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          files: |
            dist/*
          generate_release_notes: true
